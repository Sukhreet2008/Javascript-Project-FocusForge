<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer - FocusForge</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a3e 50%, #2a1a4e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-section {
            text-align: center;
            margin-bottom: 50px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #079ef5;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            gap: 12px;
            color: #08d6fa;
        }

        .header-section h1 {
            font-size: 48px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ffffff, #c5cfe0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .header-section p {
            color: #8a92a8;
            font-size: 16px;
        }

        .main-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 50px 40px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            transition: all 0.4s ease;
            text-align: center;
        }

        .main-box:hover {
            border-color: rgba(255, 107, 107, 0.3);
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-5px);
            box-shadow: 0 30px 80px rgba(255, 107, 107, 0.15);
        }

        .timer-display {
            font-size: 96px;
            font-weight: 700;
            color: #079ef5;
            margin: 40px 0;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.3);
        }

        .timer-section {
            margin-bottom: 40px;
        }

        .timer-label {
            font-size: 14px;
            text-transform: uppercase;
            color: #8a92a8;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .timer-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 12px;
            color: #8a92a8;
            text-transform: uppercase;
            font-weight: 600;
        }

        .input-group input {
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 107, 107, 0.5);
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.2);
        }

        .timer-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            padding: 30px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-btn {
            padding: 12px 28px;
            background: linear-gradient(135deg, #079ef5, #08d6fa);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(255, 107, 107, 0.4);
        }

        .control-btn:active {
            transform: translateY(-1px);
        }

        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .control-btn.pause {
            background: linear-gradient(135deg, #ffc107, #ffb300);
        }

        .control-btn.reset {
            background: linear-gradient(135deg, #6c757d, #8a99a8);
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-item {
            text-align: center;
            padding: 15px;
            background: rgba(255, 107, 107, 0.05);
            border-radius: 12px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 107, 107, 0.1);
        }

        .stat-item:hover {
            background: rgba(255, 107, 107, 0.12);
            border-color: rgba(255, 107, 107, 0.3);
            transform: translateY(-3px);
        }

        .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: #079ef5;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            color: #8a92a8;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .main-box {
                padding: 30px 25px;
            }

            .header-section h1 {
                font-size: 36px;
            }

            .timer-display {
                font-size: 72px;
                margin: 30px 0;
            }

            .timer-inputs {
                grid-template-columns: 1fr;
            }

            .timer-controls {
                flex-direction: column;
            }

            .control-btn {
                width: 100%;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .container {
                max-width: 100%;
            }

            .main-box {
                padding: 20px;
                border-radius: 16px;
            }

            .header-section h1 {
                font-size: 28px;
            }

            .timer-display {
                font-size: 56px;
                margin: 25px 0;
            }

            .control-btn {
                padding: 10px 20px;
                font-size: 13px;
            }

            .stats-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header-section">
            <a href="dashboard.html" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
            <h1>Pomodoro Timer</h1>
            <p>Focus on your tasks with the Pomodoro Technique</p>
        </div>

        <div class="main-box">
            <div class="timer-section">
                <div class="timer-label">⏱️ Time Remaining</div>
                <div class="timer-display">25:00</div>
            </div>

            <div class="timer-inputs">
                <div class="input-group">
                    <label>Work Duration (minutes)</label>
                    <input type="number" value="25" min="1" max="60">
                </div>
                <div class="input-group">
                    <label>Break Duration (minutes)</label>
                    <input type="number" value="5" min="1" max="30">
                </div>
            </div>

            <div class="timer-controls">
                <button class="control-btn">
                    <i class="fas fa-play"></i> Start
                </button>
                <button class="control-btn pause" disabled>
                    <i class="fas fa-pause"></i> Pause
                </button>
                <button class="control-btn reset">
                    <i class="fas fa-redo"></i> Reset
                </button>
            </div>

            <div class="stats-row">
                <div class="stat-item">
                    <div class="stat-number">5</div>
                    <div class="stat-label">Sessions Today</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">125 min</div>
                    <div class="stat-label">Total Focus Time</div>
                </div>
            </div>
        </div>
    </div>

    <script src="storage.js"></script>
    <script src="pomodoro.js"></script>
</body>

</html>

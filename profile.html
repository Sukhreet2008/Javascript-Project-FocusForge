<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile - FocusForge</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a3e 50%, #2a1a4e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #07ddec;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            gap: 12px;
            color: #07ddec;
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .logo i {
            font-size: 32px;
            color: #07ddec;
        }

        .logo h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #07ddec, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .header-section h2 {
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ffffff, #c5cfe0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .header-section p {
            color: #8a92a8;
            font-size: 15px;
            margin-bottom: 5px;
        }

        .mandatory-note {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 16px;
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-radius: 8px;
            color: #07ddec;
            font-size: 12px;
            font-weight: 600;
        }

        .form-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 600;
            color: #e0e0e0;
            margin-bottom: 8px;
        }

        .mandatory {
            color: red;
            font-weight: 700;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 107, 107, 0.5);
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.2);
        }

        .form-group input::placeholder {
            color: #8a92a8;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            margin: 0;
            font-weight: 500;
        }

        .radio-group input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #07ddec;
        }

        .form-divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
        }

        .form-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, rgba(255, 107, 107, 0), rgba(255, 107, 107, 0.3), rgba(255, 107, 107, 0));
        }

        .form-divider span {
            background: rgba(255, 255, 255, 0.05);
            padding: 0 12px;
            font-size: 12px;
            color: #8a92a8;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #07ddec, #0bdce4);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(255, 107, 107, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #8a92a8;
            font-size: 14px;
        }

        .login-link a {
            color: #07ddec;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .login-link a:hover {
            color: #07ddec;
        }



        .create-btn {
            width: 100%;
            padding: 14px;
            background: rgb(8, 106, 235);
            border: none;
            color: #fff;
        }

        .create-btn:hover {

            background-color: rgb(7, 213, 228);


        }

        @media (max-width: 600px) {
            .container {
                max-width: 100%;
            }

            .form-box {
                padding: 25px;
                border-radius: 12px;
            }

            .header-section h2 {
                font-size: 26px;
            }

            .logo h1 {
                font-size: 24px;
            }
        }

        @media (max-width: 480px) {
            .form-box {
                padding: 20px;
            }

            .header-section h2 {
                font-size: 22px;
            }

            .header-section p {
                font-size: 13px;
            }

            .submit-btn {
                padding: 12px;
                font-size: 14px;
            }

            .mandatory-note {
                font-size: 11px;
            }

            .radio-group {
                flex-direction: column;
                gap: 12px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>

        <div class="header-section">
            <div class="logo">
                <i class="fas fa-fire"></i>
                <h1>FocusForge</h1>
            </div>
            <h2>Student Profile</h2>
            <p>Create your account and start your productivity journey</p>
            <div class="mandatory-note">
                <i class="fas fa-info-circle"></i> Fields marked with <span class="mandatory">*</span> are mandatory
            </div>
        </div>

        <div class="form-box">
            <form action="dashboard.html" method="POST">

                <div class="form-group">
                    <label>
                        <i class="fas fa-user"></i>
                        Username
                        <span class="mandatory">*</span>
                    </label>
                    <input type="text" placeholder="Enter your name" required minlength="3" maxlength="30">
                </div>


                <div class="form-group">
                    <label>
                        <i class="fas fa-envelope"></i>
                        Email Address
                        <span class="mandatory">*</span>
                    </label>
                    <input type="email" placeholder="Enter your email" required>
                </div>


                <div class="form-group">
                    <label>
                        <i class="fas fa-phone"></i>
                        Phone Number
                        <span class="mandatory">*</span>
                    </label>
                    <input type="tel" placeholder="Enter 10-digit number" pattern="[0-9]{10}" maxlength="10" required>
                </div>

                <div class="form-divider">
                    <span>Education Details</span>
                </div>

                <div class="form-group">
                    <label>
                        <i class="fas fa-graduation-cap"></i>
                        Education Type
                        <span class="mandatory">*</span>
                    </label>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="type" value="school" required>
                            <span>School</span>
                        </label>
                        <label>
                            <input type="radio" name="type" value="college" required>
                            <span>College</span>
                        </label>
                    </div>
                </div>


                <div class="form-group">
                    <label>
                        <i class="fas fa-envelope-open"></i>
                        Secondary Email
                    </label>
                    <input type="email" placeholder="Enter secondary email (optional)">
                </div>


                <button type="submit" class="create-btn">

                    Create Account
                </button>

                <div class="login-link">
                    Already have an account?
                    <a href="dashboard.html">Go to Dashboard</a>
                </div>
            </form>
        </div>
    </div>

    <script src="storage.js"></script>
    <script src="profile.js"></script>
</body>

</html>
